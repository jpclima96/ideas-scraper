name: Coletar referências e publicar galeria

on:
  schedule:
    - cron: "0 8 * * *" # diário, 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Rodar testes
        run: pytest -q

      - name: Coletar referências
        run: python -m scraper.main

      - name: Commitar novos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nada novo para commitar."
          else
            git commit -m "chore: novas referências coletadas"
            git push
          fi

      - name: Montar artefato do site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          if [ -d data ]; then cp -r data _site/data; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
