<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ideas — referências de design</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
</head>
<body>
  <header>
    <h1>💡 Ideas</h1>
    <p class="subtitle">Referências de design web &amp; mobile, coletadas automaticamente do Dribbble, Behance e Land-book.</p>
    <input id="search" type="search" placeholder="Buscar por título, autor ou tag…" autocomplete="off">
    <div id="filters"></div>
    <p id="count" class="count"></p>
  </header>
  <main id="grid" class="grid"></main>
  <p id="empty" class="empty" hidden>Nenhuma referência encontrada. O acervo é preenchido pela GitHub Action diária.</p>
  <footer>
    <p>As imagens são miniaturas com link e crédito aos autores originais. Acervo pessoal de estudo.</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
